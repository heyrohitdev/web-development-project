<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initsial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ewert&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Rock-Paper-Scissor Game</title>
</head>

<body>
    <section id="container">
        <h1>Rock Paper Scissors Game</h1>
        <h2 class="Hello"></h2>
        <div class="buttons">
            <button class="gameBtn" onclick="playGame(0)">✊ Rock</button>
            <button class="gameBtn" onclick="playGame(1)">✋ Paper</button>
            <button class="gameBtn" onclick="playGame(2)">✌️ Scissor</button>
        </div>

        <div class="result hide"></div>

        <div class="score">
            <p>You: <span id="userScore">0</span></p>
            <p>Computer: <span id="computerScore">0</span></p>
        </div>

        <button onclick="resetGame()" id="reset">Reset-Game</button>

    </section>

    <script src="script.js"></script>
</body>

</html>
